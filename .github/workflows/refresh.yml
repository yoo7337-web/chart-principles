name: Cloud Refresh (macro/heatmap/breadth/news/deals)
# 노트북이 꺼져 있어도 24시간 사이트를 최신으로 유지하는 클라우드 갱신.
#  - engine/(분석 코드 + vendored deal_radar) 체크아웃 상태 그대로 실행 → 코어 유니버스(KR300+KOSDAQ150+US) 파이프라인
#  - 히트맵/시장폭/섹터로테이션/매크로/뉴스/딜 재생성 → data/*.json 커밋 + Pages 배포
#  - parquet 캐시(actions/cache)로 2회차부터 증분(~2분).
on:
  workflow_dispatch: {}
  repository_dispatch:        # 외부 cron 서비스(cron-job.org 등)가 30분마다 POST → 정시 보장
    types: [refresh]
  schedule:
    - cron: '*/30 * * * *'   # GitHub best-effort(실측 ~1.5~2h 지연). 정시는 repository_dispatch로 보강

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-data          # deploy.yml(pages 그룹)과 분리 — 노트북 배포가 데이터 갱신을 취소 못 함
  cancel-in-progress: false    # 긴 실행 보호, 후속은 대기(초과분만 자연 취소)

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul   # naive datetime.now()가 KST로 찍히도록(표기 9시간 지연 방지)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install deps
        run: pip install -r engine/requirements.txt

      - name: Restore parquet cache
        uses: actions/cache@v4
        with:
          path: engine/data
          key: engine-parquet-${{ github.run_id }}
          restore-keys: |
            engine-parquet-

      - name: Seed engine data from committed site data (archive/brief 연속성)
        run: |
          mkdir -p engine/app/data
          cp -f data/*.json engine/app/data/ 2>/dev/null || true

      - name: Run core pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          cd engine
          python analysis/collect.py --cloud
          python analysis/market_dash.py
          python analysis/market_news.py
          python analysis/market_pro.py
          python analysis/deal_news.py || echo "deal_news 실패(무시)"
          python analysis/calendar_events.py || echo "calendar 실패(무시)"
          python analysis/stock_extras.py || echo "stock_extras 실패(무시)"
          python analysis/investor.py || echo "investor 실패(무시)"
          python analysis/sector_news.py || echo "sector_news 실패(무시)"

      - name: Copy cloud-owned outputs back to site data
        run: |
          for f in market market_pro news news_archive news_briefings deals deals_archive deals_briefings calendar company feed sector_news investor; do
            [ -f "engine/app/data/$f.json" ] && cp -f "engine/app/data/$f.json" "data/$f.json" || true
          done

      - name: Commit refreshed data
        run: |
          git config user.name "chart-cloud-bot"
          git config user.email "actions@github.com"
          git add data/market.json data/market_pro.json data/news.json data/news_archive.json data/news_briefings.json data/deals.json data/deals_archive.json data/deals_briefings.json data/calendar.json data/company.json data/feed.json data/sector_news.json data/investor.json || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "refresh(cloud) $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main || (git rebase --abort || true)
            git push origin HEAD:main || echo "push 실패(무시, 배포는 진행)"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
