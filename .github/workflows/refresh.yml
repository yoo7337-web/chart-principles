name: Cloud Refresh (macro/heatmap/breadth/news)
# 노트북이 꺼져 있어도 24시간 사이트를 최신으로 유지하는 클라우드 갱신.
#  - engine/(분석 코드) 체크아웃 상태 그대로 실행 → 코어 유니버스(KR300+KOSDAQ150+US) 파이프라인
#  - 히트맵/시장폭/섹터로테이션/매크로/뉴스 재생성 → data/*.json 커밋 + Pages 배포
#  - parquet 캐시(actions/cache)로 2회차부터 증분(~2분). deals(딜레이더)는 로컬 의존이라 노트북 유지.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '25 * * * *'   # 매시 25분(UTC). KST 장중·미국장 모두 커버, 캐시로 저비용

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install deps
        run: pip install -r engine/requirements.txt

      - name: Restore parquet cache
        uses: actions/cache@v4
        with:
          path: engine/data
          key: engine-parquet-${{ github.run_id }}
          restore-keys: |
            engine-parquet-

      - name: Seed engine data from committed site data (archive/brief 연속성)
        run: |
          mkdir -p engine/app/data
          cp -f data/*.json engine/app/data/ 2>/dev/null || true

      - name: Run core pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd engine
          python analysis/collect.py --cloud
          python analysis/market_dash.py
          python analysis/market_news.py
          python analysis/market_pro.py

      - name: Copy cloud-owned outputs back to site data
        run: |
          for f in market market_pro news news_archive news_briefings; do
            [ -f "engine/app/data/$f.json" ] && cp -f "engine/app/data/$f.json" "data/$f.json" || true
          done

      - name: Commit refreshed data
        run: |
          git config user.name "chart-cloud-bot"
          git config user.email "actions@github.com"
          git add data/market.json data/market_pro.json data/news.json data/news_archive.json data/news_briefings.json || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "refresh(cloud) $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main || (git rebase --abort || true)
            git push origin HEAD:main || echo "push 실패(무시, 배포는 진행)"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
