name: KIND probe (일회성)
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: engine/requirements.txt
      - run: pip install -r engine/requirements.txt
      - run: cd engine && python analysis/calendar_events.py --probe-kr
